services:
  # Backend API
  - type: web
    name: hubspot-sync-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: hubspot-sync-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hubspot-sync-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://frontend-nine-bay-26.vercel.app
      - key: HUBSPOT_CLIENT_ID
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: HUBSPOT_REDIRECT_URI
        value: https://hubspot-sync-api.onrender.com/api/auth/hubspot/callback
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health

  # Background Worker for Contact Sync
  - type: worker
    name: hubspot-sync-worker
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && node dist/workers/contact-sync.worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hubspot-sync-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hubspot-sync-redis
          type: redis
          property: connectionString
      - key: HUBSPOT_CLIENT_ID
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: hubspot-sync-db
    plan: free
    databaseName: hubspot_sync
    ipAllowList: []

  - name: hubspot-sync-redis
    plan: free
    ipAllowList: []
